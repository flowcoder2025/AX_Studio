<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AX Studio — 14 Category Template Map</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Pretendard',sans-serif;background:#f5f5f5;padding:24px;max-width:800px;margin:0 auto}
h1{font-size:20px;font-weight:600;margin-bottom:4px}
.subtitle{font-size:13px;color:#888;margin-bottom:20px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px;margin-bottom:20px}
.cat-card{background:#fff;border:1px solid #e5e3de;border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .15s}
.cat-card:hover{border-color:#aaa}
.cat-card.active{border:2px solid #2563eb;background:#f8faff}
.cat-name{font-size:13px;font-weight:600}
.cat-sub{font-size:10px;color:#999;margin-top:2px}
.cat-tag{display:inline-block;font-size:9px;padding:1px 6px;border-radius:10px;margin-top:4px}
.tag-orig{background:#E6F1FB;color:#0C447C}
.tag-new{background:#E1F5EE;color:#085041}
.detail{background:#fff;border-radius:12px;padding:20px;border:1px solid #e5e3de}
.detail-title{font-size:17px;font-weight:600;margin-bottom:2px}
.detail-desc{font-size:12px;color:#888;margin-bottom:14px}
.block-list{display:flex;flex-direction:column;gap:4px}
.b-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;font-size:12px;background:#fafafa;border:0.5px solid #eee}
.b-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.b-name{font-weight:600;flex:1}
.b-src{font-size:9px;padding:1px 6px;border-radius:10px;flex-shrink:0}
.src-claude{background:#E6F1FB;color:#0C447C}
.src-comfy{background:#FAECE7;color:#712B13}
.src-ffmpeg{background:#FAEEDA;color:#633806}
.b-type{font-size:10px;color:#aaa}
.tone-bar{display:flex;gap:4px;margin:12px 0 8px}
.tone-chip{font-size:11px;padding:3px 8px;border-radius:4px;background:#EEEDFE;color:#3C3489;border:1px solid #AFA9EC}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;font-size:11px;color:#888}
.legend span{display:flex;align-items:center;gap:4px}
.ldot{width:8px;height:8px;border-radius:50%}
.note{font-size:12px;color:#888;margin-top:10px;padding:10px;background:#fafafa;border-radius:6px;border:1px solid #eee;line-height:1.5}
.vslots{margin-top:12px}
.vslot{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:6px;margin-top:4px;font-size:12px;background:#fafafa;border:0.5px solid #eee}
</style>
</head>

const srcCls={claude:'src-claude',comfy:'src-comfy',ffmpeg:'src-ffmpeg'};
const srcLbl={claude:'Claude',comfy:'ComfyUI',ffmpeg:'FFmpeg'};
const numBg={claude:'#B5D4F4',comfy:'#F5C4B3',ffmpeg:'#FAC775'};

function renderGrid(){
  document.getElementById('catGrid').innerHTML=T.map((c,i)=>`<div class="cat-card${i===0?' active':''}" onclick="showCat(${i})" id="cc${i}"><div class="cat-name">${c.name}</div><div class="cat-sub">${c.sub}</div><span class="cat-tag ${c.tag==='orig'?'tag-orig':'tag-new'}">${c.tag==='orig'?'original':'new'}</span></div>`).join('');
}
function showCat(idx){
  document.querySelectorAll('.cat-card').forEach(c=>c.classList.remove('active'));
  document.getElementById('cc'+idx).classList.add('active');
  const c=T[idx];

    <div class="detail-title">${c.name}</div>
    <div class="detail-desc">${c.sub}</div>
    <div class="tone-bar">${c.tone.map(t=>`<span class="tone-chip">${t}</span>`).join('')}</div>
    <div class="block-list">${c.blocks.map((b,i)=>`<div class="b-row"><div class="b-num" style="background:${numBg[b.src]};color:#333">${i+1}</div><div class="b-name">${b.n}</div><div class="b-type">${b.type}</div><div class="b-src ${srcCls[b.src]}">${srcLbl[b.src]}</div></div>`).join('')}</div>
    <div class="vslots"><div style="font-size:13px;font-weight:600;margin-bottom:4px">Video slots</div>${c.videos.map(v=>`<div class="vslot"><span style="color:#aaa;margin-right:4px">▶</span>${v}</div>`).join('')}</div>
    <div class="note">${c.note}</div>`;
}
renderGrid();showCat(0);
</script>
</body>
</html>
